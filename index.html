<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Overdose Rate — 2018–2022 vs 2020–2024</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #ff4d6d;
    --accent2: #4d9fff;
    --increase: #ff4d6d;
    --decrease: #4dffb4;
    --neutral: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }

  .header-left h1 { font-size: 16px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
  .header-left p { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .mode-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .mode-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn.active { background: var(--accent); color: white; }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .top-section {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* MAP AREA */
  .map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map-svg { width: 100%; height: 100%; }

  .breadcrumb {
    position: absolute; top: 16px; left: 20px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); z-index: 10;
  }
  .breadcrumb .crumb { cursor: pointer; color: var(--accent2); transition: opacity 0.2s; }
  .breadcrumb .crumb:hover { opacity: 0.7; }
  .breadcrumb .sep { color: var(--border); }
  .breadcrumb .current { color: var(--text); cursor: default; }

  #back-btn {
    position: absolute; top: 16px; left: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 7px 14px; border-radius: 6px; cursor: pointer;
    display: none; z-index: 10; transition: border-color 0.2s;
  }
  #back-btn:hover { border-color: var(--accent2); }

  .legend {
    position: absolute; bottom: 24px; left: 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; z-index: 10; min-width: 220px;
  }
  .legend-title { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .legend-gradient { height: 8px; border-radius: 4px; width: 100%; margin-bottom: 6px; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .legend-na { margin-top: 8px; display: flex; align-items: center; gap: 6px; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .legend-na-box { width: 14px; height: 8px; border-radius: 2px; background: #222; border: 1px solid #333; }

  /* SIDEBAR */
  .sidebar {
    width: 0; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; overflow-x: hidden;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0;
  }
  .sidebar.open { width: 340px; }
  .sidebar-inner { width: 340px; padding: 24px; }
  .sidebar-close { float: right; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; margin-bottom: 12px; line-height: 1; }
  .sidebar-close:hover { color: var(--text); }
  .county-name { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
  .county-pop { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 20px; }

  .rate-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .rate-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .rate-card .label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .rate-card .value { font-size: 26px; font-weight: 800; font-family: 'DM Mono', monospace; line-height: 1; }
  .rate-card .sublabel { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 2px; }

  .change-card {
    background: var(--bg); border-radius: 8px; padding: 12px 14px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border);
  }
  .change-card .change-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .change-card .change-value { font-size: 24px; font-weight: 800; font-family: 'DM Mono', monospace; }
  .change-card .change-pct { font-size: 13px; font-family: 'DM Mono', monospace; opacity: 0.7; margin-left: 6px; }

  .up { color: var(--increase); }
  .down { color: var(--decrease); }
  .na-text { color: var(--muted); font-size: 14px; }

  .suppressed-note { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); background: var(--bg); border: 1px dashed var(--border); border-radius: 6px; padding: 8px 10px; margin-bottom: 20px; }
  .section-title { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 14px; color: var(--muted); }
  .stat-value { font-size: 14px; font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }

  .bar-row { margin-bottom: 8px; }
  .bar-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .bar-label { font-size: 13px; color: var(--muted); }
  .bar-pct { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); }
  .bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--accent2); transition: width 0.5s ease; }
  .section-gap { margin-bottom: 20px; }

  /* TOOLTIP */
  .tooltip {
    position: fixed; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; font-size: 14px;
    pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.15s; max-width: 220px;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .t-name { font-weight: 600; margin-bottom: 6px; font-size: 15px; }
  .tooltip .t-stat { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .tooltip .t-stat span { color: var(--text); }

  .county-path, .state-path { stroke: #1a1a2a; cursor: pointer; transition: opacity 0.15s; }
  .county-path:hover, .state-path:hover { opacity: 0.75; stroke: white; stroke-width: 1.5px; }
  .county-path.selected { stroke: white; stroke-width: 2px; }
  .state-boundary { fill: none; stroke: #2a2a3a; stroke-width: 1px; pointer-events: none; }

  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: var(--bg); z-index: 50; gap: 12px;
  }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  /* ─── CHART PANEL ─────────────────────────────────────── */
  .chart-panel {
    height: 260px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .chart-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px 0;
    flex-shrink: 0;
  }

  .chart-tabs {
    display: flex;
    gap: 2px;
  }

  .chart-tab {
    padding: 5px 12px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .chart-tab.active {
    background: var(--border);
    color: var(--text);
  }

  .chart-tab:hover:not(.active) { color: var(--text); }

  .chart-context {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .chart-panel-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chart-panel-toggle:hover { color: var(--text); border-color: var(--accent2); }

  .chart-content {
    flex: 1;
    overflow: hidden;
    padding: 8px 20px 12px;
    display: flex;
    align-items: stretch;
  }

  .chart-view {
    display: none;
    width: 100%;
    height: 100%;
  }

  .chart-view.active {
    display: flex;
    align-items: flex-end;
    gap: 2px;
  }

  /* Bar chart (ranking) */
  #chart-ranking svg,
  #chart-compare svg,
  #chart-scatter svg,
  #chart-histogram svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .chart-view svg text {
    font-family: 'DM Mono', monospace;
  }

  /* Resize handle */
  .chart-resize-handle {
    height: 6px;
    background: transparent;
    cursor: ns-resize;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .chart-resize-handle:hover { background: rgba(255,255,255,0.05); }
  .chart-resize-handle::before {
    content: '';
    width: 40px;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.2s;
  }
  .chart-resize-handle:hover::before { background: var(--accent2); }
  .chart-resize-handle.dragging::before { background: var(--accent2); }

  /* collapsed state */
  .chart-panel.collapsed {
    height: 42px;
    overflow: hidden;
  }
  .chart-panel.collapsed .chart-content { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>US Drug Overdose Rate</h1>
    <p>5-Year Estimates · 2018–2022 vs 2020–2024 · County Level</p>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="rate_2022">2018–2022</button>
    <button class="mode-btn" data-mode="rate_2024">2020–2024</button>
    <button class="mode-btn" data-mode="rate_change">Change</button>
  </div>
</header>

<div class="main">
  <div class="top-section">
    <div class="map-area">
      <div id="loading">
        <div class="spinner"></div>
        <p>Loading map data…</p>
      </div>
      <button id="back-btn">← Back to US</button>
      <svg id="map-svg"></svg>
      <div class="legend" id="legend">
        <div class="legend-title" id="legend-title">Overdose Rate per 100k (2018–2022)</div>
        <div class="legend-gradient" id="legend-gradient"></div>
        <div class="legend-labels">
          <span id="legend-min">0</span>
          <span id="legend-max">100+</span>
        </div>
        <div class="legend-na"><div class="legend-na-box"></div> No data / suppressed</div>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-inner" id="sidebar-content"></div>
    </div>
  </div>

  <!-- ─── CHART PANEL ─── -->
  <div class="chart-panel" id="chart-panel">
    <div class="chart-resize-handle" id="chart-resize-handle"></div>
    <div class="chart-panel-header">
      <div class="chart-tabs">
        <button class="chart-tab active" data-chart="ranking">Top Counties</button>
        <button class="chart-tab" data-chart="compare">Period Compare</button>
        <button class="chart-tab" data-chart="scatter">Rate vs Poverty</button>
        <button class="chart-tab" data-chart="histogram">Distribution</button>
      </div>
      <span class="chart-context" id="chart-context">National · All Counties</span>
      <button class="chart-panel-toggle" id="chart-toggle">▼ Hide</button>
    </div>
    <div class="chart-content">
      <div class="chart-view active" id="chart-ranking"></div>
      <div class="chart-view" id="chart-compare"></div>
      <div class="chart-view" id="chart-scatter"></div>
      <div class="chart-view" id="chart-histogram"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const TOPO_URL = "https://cdn.jsdelivr.net/npm/us-atlas@3/counties-albers-10m.json";
const DATA_URL = "data/counties.json";

const COLOR_SCHEMES = {
  rate_2022:   { scale: d3.scaleSequential(d3.interpolateYlOrRd).domain([0, 100]),  label: "Overdose Rate per 100k (2018–2022)", min: "0", max: "100+" },
  rate_2024:   { scale: d3.scaleSequential(d3.interpolateYlOrRd).domain([0, 100]),  label: "Overdose Rate per 100k (2020–2024)", min: "0", max: "100+" },
  rate_change: { scale: d3.scaleDiverging(d3.interpolateRdBu).domain([50, 0, -50]), label: "Change in Rate per 100k", min: "-50", max: "+50" },
};

// ─── STATE ────────────────────────────────────────────────
let currentMode = "rate_2022";
let currentView = "us";
let selectedFips = null;
let currentChartTab = "ranking";
let topoData, countyData, countyMap;
let path, projection, svg, g;
let zoomBehavior = null;
let chartCounties = []; // counties currently shown in charts

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  try {
    [topoData, countyData] = await Promise.all([
      d3.json(TOPO_URL),
      d3.json(DATA_URL)
    ]);
  } catch(e) {
    document.querySelector("#loading p").textContent = "Error loading data. Check data/counties.json exists.";
    return;
  }

  countyMap = new Map(countyData.map(d => [d.fips, d]));
  chartCounties = countyData.filter(d => d.rate_2022 != null);

  setupSVG();
  setupControls();
  setupChartTabs();
  setupChartToggle();
  drawUS();
  setupZoom();
  renderActiveChart();

  document.getElementById("loading").style.display = "none";
}

// ─── SVG SETUP ────────────────────────────────────────────
function setupSVG() {
  svg = d3.select("#map-svg");
  g = svg.append("g");
}

function getSize() {
  const el = document.querySelector(".map-area");
  return { w: el.clientWidth, h: el.clientHeight };
}

// ─── CONTROLS ─────────────────────────────────────────────
function setupControls() {
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentMode = btn.dataset.mode;
      updateLegend();
      updateColors();
      renderActiveChart();
    });
  });

  document.getElementById("back-btn").addEventListener("click", () => {
    closeSidebar();
    drawUS();
  });
}

// ─── CHART TABS ───────────────────────────────────────────
function setupChartTabs() {
  document.querySelectorAll(".chart-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".chart-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".chart-view").forEach(v => v.classList.remove("active"));
      tab.classList.add("active");
      currentChartTab = tab.dataset.chart;
      document.getElementById(`chart-${currentChartTab}`).classList.add("active");
      renderActiveChart();
    });
  });
}

function setupChartToggle() {
  const btn = document.getElementById("chart-toggle");
  const panel = document.getElementById("chart-panel");
  btn.addEventListener("click", () => {
    panel.classList.toggle("collapsed");
    btn.textContent = panel.classList.contains("collapsed") ? "▲ Show Charts" : "▼ Hide";
  });
}

function renderActiveChart() {
  if (!countyData) return;
  const panel = document.getElementById("chart-panel");
  if (panel.classList.contains("collapsed")) return;

  // Update context label
  const contextEl = document.getElementById("chart-context");
  if (currentView === "us") {
    contextEl.textContent = "National · All Counties";
  } else {
    const stateName = topojson.feature(topoData, topoData.objects.states).features
      .find(d => d.id.toString().padStart(2,"0") === currentView)?.properties.name || currentView;
    contextEl.textContent = `${stateName} · County Level`;
  }

  switch(currentChartTab) {
    case "ranking":   renderRankingChart(); break;
    case "compare":   renderCompareChart(); break;
    case "scatter":   renderScatterChart(); break;
    case "histogram": renderHistogramChart(); break;
  }
}

// ─── CHART: TOP COUNTIES RANKING ──────────────────────────
function renderRankingChart() {
  const el = document.getElementById("chart-ranking");
  el.innerHTML = "";

  const field = currentMode === "rate_change" ? "rate_change" : (currentMode === "rate_2024" ? "rate_2024" : "rate_2022");
  const sorted = chartCounties
    .filter(d => d[field] != null)
    .sort((a, b) => b[field] - a[field])
    .slice(0, 15);

  if (sorted.length === 0) { el.innerHTML = `<span style="color:var(--muted);font-family:'DM Mono';font-size:11px">No data</span>`; return; }

  const W = el.clientWidth || 600;
  const H = el.clientHeight || 190;
  // Dynamic left margin based on longest name
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '12px DM Mono, monospace';
  const maxNameW = d3.max(sorted, d => ctx.measureText(d.name.length > 32 ? d.name.slice(0,31)+"…" : d.name).width);
  const leftMargin = Math.min(Math.ceil(maxNameW) + 16, 360);
  const margin = { top: 10, right: 60, bottom: 24, left: leftMargin };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svgEl = d3.select(el).append("svg")
    .attr("width", W).attr("height", H);
  const chart = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const maxVal = d3.max(sorted, d => Math.abs(d[field]));
  const xScale = d3.scaleLinear().domain([0, maxVal * 1.05]).range([0, w]);
  const yScale = d3.scaleBand().domain(sorted.map(d => d.name)).range([0, h]).padding(0.25);

  // Grid lines
  chart.selectAll(".grid-line")
    .data(xScale.ticks(4))
    .join("line")
    .attr("class", "grid-line")
    .attr("x1", d => xScale(d)).attr("x2", d => xScale(d))
    .attr("y1", 0).attr("y2", h)
    .attr("stroke", "var(--border)").attr("stroke-width", 0.5);

  // Bars
  chart.selectAll(".rank-bar")
    .data(sorted)
    .join("rect")
    .attr("class", "rank-bar")
    .attr("x", 0)
    .attr("y", d => yScale(d.name))
    .attr("width", d => xScale(Math.abs(d[field])))
    .attr("height", yScale.bandwidth())
    .attr("rx", 2)
    .attr("fill", d => {
      if (field === "rate_change") return d[field] > 0 ? "var(--increase)" : "var(--decrease)";
      const v = d[field] / 100;
      return `rgba(255,${Math.round(77 + (1-v)*150)},${Math.round(109 + (1-v)*130)},0.85)`;
    });

  // Value labels
  chart.selectAll(".rank-val")
    .data(sorted)
    .join("text")
    .attr("x", d => xScale(Math.abs(d[field])) + 4)
    .attr("y", d => yScale(d.name) + yScale.bandwidth() / 2)
    .attr("dy", "0.35em")
    .attr("fill", "var(--muted)")
    .attr("font-size", "11px")
    .text(d => (field === "rate_change" && d[field] > 0 ? "+" : "") + d[field].toFixed(1));

  // Y axis labels
  chart.selectAll(".rank-label")
    .data(sorted)
    .join("text")
    .attr("x", -6)
    .attr("y", d => yScale(d.name) + yScale.bandwidth() / 2)
    .attr("dy", "0.35em")
    .attr("text-anchor", "end")
    .attr("fill", "var(--text)")
    .attr("font-size", "12px")
    .text(d => d.name);

  // X axis
  chart.append("g")
    .attr("transform", `translate(0,${h})`)
    .call(d3.axisBottom(xScale).ticks(4).tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));
}

// ─── CHART: PERIOD COMPARE ────────────────────────────────
function renderCompareChart() {
  const el = document.getElementById("chart-compare");
  el.innerHTML = "";

  // Show top 12 counties by 2022 rate
  const counties = chartCounties
    .filter(d => d.rate_2022 != null && d.rate_2024 != null)
    .sort((a, b) => b.rate_2022 - a.rate_2022)
    .slice(0, 12);

  if (counties.length === 0) { el.innerHTML = `<span style="color:var(--muted);font-size:11px;font-family:'DM Mono'">No data</span>`; return; }

  const W = el.clientWidth || 600;
  const H = el.clientHeight || 190;
  // Dynamic left margin based on longest name
  const canvas2 = document.createElement('canvas');
  const ctx2 = canvas2.getContext('2d');
  ctx2.font = '12px DM Mono, monospace';
  const maxNameW2 = d3.max(counties, d => ctx2.measureText(d.name.length > 32 ? d.name.slice(0,31)+"…" : d.name).width);
  const leftMargin2 = Math.min(Math.ceil(maxNameW2) + 16, 360);
  const margin = { top: 14, right: 20, bottom: 36, left: leftMargin2 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svgEl = d3.select(el).append("svg").attr("width", W).attr("height", H);
  const chart = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const maxVal = d3.max(counties, d => Math.max(d.rate_2022, d.rate_2024)) * 1.05;
  const xScale = d3.scaleLinear().domain([0, maxVal]).range([0, w]);
  const yScale = d3.scaleBand().domain(counties.map(d => d.name)).range([0, h]).padding(0.2);
  const barH = yScale.bandwidth() / 2 - 1;

  // Grid
  chart.selectAll(".grid-line")
    .data(xScale.ticks(4))
    .join("line")
    .attr("x1", d => xScale(d)).attr("x2", d => xScale(d))
    .attr("y1", 0).attr("y2", h)
    .attr("stroke", "var(--border)").attr("stroke-width", 0.5);

  // Bars 2022
  chart.selectAll(".bar-22")
    .data(counties)
    .join("rect")
    .attr("x", 0)
    .attr("y", d => yScale(d.name))
    .attr("width", d => xScale(d.rate_2022))
    .attr("height", barH)
    .attr("rx", 2)
    .attr("fill", "rgba(77,159,255,0.75)");

  // Bars 2024
  chart.selectAll(".bar-24")
    .data(counties)
    .join("rect")
    .attr("x", 0)
    .attr("y", d => yScale(d.name) + barH + 2)
    .attr("width", d => xScale(d.rate_2024))
    .attr("height", barH)
    .attr("rx", 2)
    .attr("fill", "rgba(255,77,109,0.75)");

  // Labels
  chart.selectAll(".cmp-label")
    .data(counties)
    .join("text")
    .attr("x", -6)
    .attr("y", d => yScale(d.name) + yScale.bandwidth() / 2)
    .attr("dy", "0.35em")
    .attr("text-anchor", "end")
    .attr("fill", "var(--text)")
    .attr("font-size", "12px")
    .text(d => d.name);

  // X axis
  chart.append("g")
    .attr("transform", `translate(0,${h})`)
    .call(d3.axisBottom(xScale).ticks(4).tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));

  // Legend
  const leg = chart.append("g").attr("transform", `translate(${w/2 - 80}, ${h + 20})`);
  leg.append("rect").attr("width", 10).attr("height", 6).attr("rx", 1).attr("fill", "rgba(77,159,255,0.75)");
  leg.append("text").attr("x", 14).attr("y", 6).attr("fill", "var(--muted)").attr("font-size", "11px").text("2018–2022");
  leg.append("rect").attr("x", 70).attr("width", 10).attr("height", 6).attr("rx", 1).attr("fill", "rgba(255,77,109,0.75)");
  leg.append("text").attr("x", 84).attr("y", 6).attr("fill", "var(--muted)").attr("font-size", "11px").text("2020–2024");
}

// ─── CHART: SCATTER PLOT ──────────────────────────────────
function renderScatterChart() {
  const el = document.getElementById("chart-scatter");
  el.innerHTML = "";

  const field = currentMode === "rate_2024" ? "rate_2024" : "rate_2022";
  const data = chartCounties.filter(d => d[field] != null && d.poverty != null);

  if (data.length === 0) { el.innerHTML = `<span style="color:var(--muted);font-size:11px;font-family:'DM Mono'">No poverty data available</span>`; return; }

  const W = el.clientWidth || 600;
  const H = el.clientHeight || 190;
  const margin = { top: 10, right: 30, bottom: 36, left: 50 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svgEl = d3.select(el).append("svg").attr("width", W).attr("height", H);
  const chart = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const xScale = d3.scaleLinear().domain([0, d3.max(data, d => d.poverty) * 1.05]).range([0, w]);
  const yScale = d3.scaleLinear().domain([0, d3.max(data, d => d[field]) * 1.05]).range([h, 0]);

  // Grid
  chart.selectAll(".gridx").data(xScale.ticks(5)).join("line")
    .attr("x1", d => xScale(d)).attr("x2", d => xScale(d))
    .attr("y1", 0).attr("y2", h)
    .attr("stroke", "var(--border)").attr("stroke-width", 0.5);
  chart.selectAll(".gridy").data(yScale.ticks(4)).join("line")
    .attr("x1", 0).attr("x2", w)
    .attr("y1", d => yScale(d)).attr("y2", d => yScale(d))
    .attr("stroke", "var(--border)").attr("stroke-width", 0.5);

  // Dots
  chart.selectAll(".dot")
    .data(data)
    .join("circle")
    .attr("cx", d => xScale(d.poverty))
    .attr("cy", d => yScale(d[field]))
    .attr("r", 3)
    .attr("fill", d => COLOR_SCHEMES[currentMode].scale(d[field]))
    .attr("opacity", 0.65)
    .attr("stroke", "none");

  // Trend line (linear regression)
  const n = data.length;
  const meanX = d3.mean(data, d => d.poverty);
  const meanY = d3.mean(data, d => d[field]);
  const slope = d3.sum(data, d => (d.poverty - meanX) * (d[field] - meanY)) /
                d3.sum(data, d => (d.poverty - meanX) ** 2);
  const intercept = meanY - slope * meanX;
  const xMin = d3.min(data, d => d.poverty);
  const xMax = d3.max(data, d => d.poverty);

  chart.append("line")
    .attr("x1", xScale(xMin)).attr("x2", xScale(xMax))
    .attr("y1", yScale(slope * xMin + intercept)).attr("y2", yScale(slope * xMax + intercept))
    .attr("stroke", "var(--accent)").attr("stroke-width", 1.5)
    .attr("stroke-dasharray", "4 3").attr("opacity", 0.8);

  // Axes
  chart.append("g").attr("transform", `translate(0,${h})`)
    .call(d3.axisBottom(xScale).ticks(5).tickFormat(d => d + "%").tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));

  chart.append("g")
    .call(d3.axisLeft(yScale).ticks(4).tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));

  // Axis labels
  chart.append("text").attr("x", w / 2).attr("y", h + 30)
    .attr("text-anchor", "middle").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text("Poverty Rate (%)");

  chart.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -h / 2).attr("y", -38)
    .attr("text-anchor", "middle").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text("Overdose Rate per 100k");

  // Correlation label
  const corr = pearsonR(data.map(d => d.poverty), data.map(d => d[field]));
  chart.append("text").attr("x", w - 4).attr("y", 14)
    .attr("text-anchor", "end").attr("fill", "var(--accent)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text(`r = ${corr.toFixed(2)}`);
}

function pearsonR(xs, ys) {
  const n = xs.length;
  const mx = d3.mean(xs), my = d3.mean(ys);
  const num = d3.sum(xs.map((x, i) => (x - mx) * (ys[i] - my)));
  const den = Math.sqrt(d3.sum(xs.map(x => (x - mx) ** 2)) * d3.sum(ys.map(y => (y - my) ** 2)));
  return den === 0 ? 0 : num / den;
}

// ─── CHART: HISTOGRAM ─────────────────────────────────────
function renderHistogramChart() {
  const el = document.getElementById("chart-histogram");
  el.innerHTML = "";

  const field = currentMode === "rate_change" ? "rate_change" : (currentMode === "rate_2024" ? "rate_2024" : "rate_2022");
  const dataObjs = chartCounties.filter(d => d[field] != null);
  const data = dataObjs.map(d => d[field]);

  if (data.length === 0) { el.innerHTML = `<span style="color:var(--muted);font-size:11px;font-family:'DM Mono'">No data</span>`; return; }

  const W = el.clientWidth || 600;
  const H = el.clientHeight || 190;
  const margin = { top: 10, right: 30, bottom: 36, left: 45 };
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svgEl = d3.select(el).append("svg").attr("width", W).attr("height", H);
  const chart = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const xScale = d3.scaleLinear().domain(d3.extent(data)).nice().range([0, w]);
  const bins = d3.bin().value(d => d[field]).domain(xScale.domain()).thresholds(24)(dataObjs);
  const yScale = d3.scaleLinear().domain([0, d3.max(bins, d => d.length)]).nice().range([h, 0]);

  // Grid
  chart.selectAll(".gridy").data(yScale.ticks(4)).join("line")
    .attr("x1", 0).attr("x2", w)
    .attr("y1", d => yScale(d)).attr("y2", d => yScale(d))
    .attr("stroke", "var(--border)").attr("stroke-width", 0.5);

  // Bars
  chart.selectAll(".hbar")
    .data(bins)
    .join("rect")
    .attr("x", d => xScale(d.x0) + 1)
    .attr("y", d => yScale(d.length))
    .attr("width", d => Math.max(0, xScale(d.x1) - xScale(d.x0) - 2))
    .attr("height", d => h - yScale(d.length))
    .attr("fill", d => {
      const mid = (d.x0 + d.x1) / 2;
      return COLOR_SCHEMES[currentMode].scale(mid);
    })
    .attr("opacity", 0.85)
    .attr("rx", 1);

  // Add an invisible, full-height hit area per bin so short bars are still hoverable
  chart.selectAll(".hbar-hit")
    .data(bins)
    .join("rect")
    .attr("class", "hbar-hit")
    .attr("x", d => xScale(d.x0))
    .attr("y", 0)
    .attr("width", d => Math.max(0, xScale(d.x1) - xScale(d.x0)))
    .attr("height", h)
    .attr("fill", "transparent")
    .style("pointer-events", "all")
    .style("cursor", "pointer")
    .on("mousemove", (event, bin) => {
      const tip = document.getElementById('tooltip');
      const names = bin.map(c => c.name);
      const shown = names.slice(0, 12);
      const more = names.length > shown.length ? `\n+${names.length - shown.length} more` : "";
      tip.innerHTML = `<div class="t-name">${bin.length} counties${more}</div><div class="t-stat">${shown.join('<br>')}</div>`;
      tip.style.left = (event.clientX + 12) + 'px';
      tip.style.top = (event.clientY - 10) + 'px';
      tip.classList.add('visible');
    })
    .on("mouseleave", () => {
      document.getElementById('tooltip').classList.remove('visible');
    });

  // Mean line
  const mean = d3.mean(data);
  chart.append("line")
    .attr("x1", xScale(mean)).attr("x2", xScale(mean))
    .attr("y1", 0).attr("y2", h)
    .attr("stroke", "white").attr("stroke-width", 1).attr("stroke-dasharray", "3 2").attr("opacity", 0.6);

  chart.append("text")
    .attr("x", xScale(mean) + 4).attr("y", 12)
    .attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text(`mean: ${mean.toFixed(1)}`);

  // Axes
  chart.append("g").attr("transform", `translate(0,${h})`)
    .call(d3.axisBottom(xScale).ticks(6).tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));

  chart.append("g")
    .call(d3.axisLeft(yScale).ticks(4).tickSize(0))
    .call(g => g.select(".domain").attr("stroke", "var(--border)"))
    .call(g => g.selectAll("text").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'"));

  // X label
  const xLabel = field === "rate_change" ? "Change in Rate per 100k" : "Overdose Rate per 100k";
  chart.append("text").attr("x", w / 2).attr("y", h + 30)
    .attr("text-anchor", "middle").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text(xLabel);

  // Count label
  chart.append("text").attr("x", w - 4).attr("y", 14)
    .attr("text-anchor", "end").attr("fill", "var(--muted)").attr("font-size", "11px").attr("font-family", "'DM Mono'")
    .text(`n = ${data.length} counties`);
}

// ─── COLOR ────────────────────────────────────────────────
function getColor(fips) {
  const d = countyMap.get(fips);
  if (!d) return "#1e2d45";
  const v = d[currentMode];
  if (v === null || v === undefined) return "#1e2d45";
  return COLOR_SCHEMES[currentMode].scale(v);
}

function updateColors() {
  g.selectAll(".county-path").attr("fill", d => getColor(d.id.toString().padStart(5, "0")));
}

// ─── LEGEND ───────────────────────────────────────────────
function updateLegend() {
  const scheme = COLOR_SCHEMES[currentMode];
  document.getElementById("legend-title").textContent = scheme.label;
  document.getElementById("legend-min").textContent = scheme.min;
  document.getElementById("legend-max").textContent = scheme.max;
  const grad = document.getElementById("legend-gradient");
  if (currentMode === "rate_change") {
    grad.style.background = "linear-gradient(to right, #2166ac, #f7f7f7, #d6604d)";
  } else {
    grad.style.background = "linear-gradient(to right, #ffffd4, #fed98e, #fe9929, #d95f0e, #993404)";
  }
}

// ─── DRAW US ──────────────────────────────────────────────
function drawUS() {
  currentView = "us";
  chartCounties = countyData ? countyData.filter(d => d.rate_2022 != null) : [];
  document.getElementById("back-btn").style.display = "none";
  g.selectAll("*").remove();
  setupZoom();

  const { w, h } = getSize();
  const counties = topojson.feature(topoData, topoData.objects.counties);
  const states   = topojson.feature(topoData, topoData.objects.states);
  const mesh     = topojson.mesh(topoData, topoData.objects.states, (a, b) => a !== b);

  projection = d3.geoIdentity().reflectY(false).fitSize([w, h], counties);
  path = d3.geoPath().projection(projection);

  g.selectAll(".county-path")
    .data(counties.features)
    .join("path")
    .attr("class", "county-path")
    .attr("d", path)
    .attr("fill", d => getColor(d.id.toString().padStart(5, "0")))
    .attr("stroke-width", 0.3)
    .on("mousemove", (event, d) => showTooltip(event, d.id.toString().padStart(5, "0")))
    .on("mouseleave", hideTooltip)
    .on("click", (event, d) => {
      const fips = d.id.toString().padStart(5, "0");
      drawState(fips.slice(0, 2));
    });

  g.append("path").attr("class", "state-boundary").attr("d", path(mesh));

  g.selectAll(".state-overlay")
    .data(states.features)
    .join("path")
    .attr("class", "state-overlay")
    .attr("d", path)
    .attr("fill", "rgba(0,0,0,0.2)")
    .attr("stroke", "rgba(255,255,255,0.6)")
    .attr("stroke-width", "1px")
    .style("pointer-events", "none");

  g.selectAll(".state-label")
    .data(states.features)
    .join("text")
    .attr("class", "state-label")
    .attr("transform", d => `translate(${path.centroid(d)})`)
    .attr("text-anchor", "middle").attr("dy", "0.35em")
    .style("font-size", "11px").style("font-family", "DM Mono, monospace")
    .style("fill", "white").style("pointer-events", "none")
    .style("paint-order", "stroke").style("stroke", "rgba(0,0,0,0.8)").style("stroke-width", "2px")
    .text(d => {
      const abbr = {"Vermont":"VT","New Hampshire":"NH","Massachusetts":"MA","Rhode Island":"RI","Connecticut":"CT","New Jersey":"NJ","Delaware":"DE","Maryland":"MD","District of Columbia":"DC","Hawaii":"HI"};
      return abbr[d.properties.name] || d.properties.name;
    });

  updateLegend();
  renderActiveChart();
}

// ─── DRAW STATE ───────────────────────────────────────────
function drawState(stateFips) {
  currentView = stateFips;
  // Filter chart counties to this state
  chartCounties = countyData
    ? countyData.filter(d => d.fips && d.fips.slice(0, 2) === stateFips && d.rate_2022 != null)
    : [];

  document.getElementById("back-btn").style.display = "block";
  const stateName = topojson.feature(topoData, topoData.objects.states).features
    .find(d => d.id.toString().padStart(2,"0") === stateFips)?.properties.name || stateFips;
  document.getElementById("back-btn").textContent = `← ${stateName}`;

  g.selectAll("*").remove();
  if (zoomBehavior) {
    svg.transition().duration(250).call(zoomBehavior.transform, d3.zoomIdentity);
    svg.on(".zoom", null);
  }

  const { w, h } = getSize();
  const allCounties = topojson.feature(topoData, topoData.objects.counties);
  const stateCounties = {
    type: "FeatureCollection",
    features: allCounties.features.filter(d => d.id.toString().padStart(5,"0").slice(0,2) === stateFips)
  };

  if (stateCounties.features.length === 0) return;

  projection = d3.geoIdentity().reflectY(false).fitExtent([[40, 40], [w - 40, h - 40]], stateCounties);
  path = d3.geoPath().projection(projection);

  g.selectAll(".county-path")
    .data(stateCounties.features)
    .join("path")
    .attr("class", "county-path")
    .attr("d", path)
    .attr("fill", d => getColor(d.id.toString().padStart(5,"0")))
    .attr("stroke-width", 0.8)
    .on("mousemove", (event, d) => showTooltip(event, d.id.toString().padStart(5,"0")))
    .on("mouseleave", hideTooltip)
    .on("click", (event, d) => {
      const fips = d.id.toString().padStart(5,"0");
      if (selectedFips === fips) {
        closeSidebar();
        selectedFips = null;
        g.selectAll(".county-path").classed("selected", false);
        return;
      }
      selectedFips = fips;
      g.selectAll(".county-path").classed("selected", dd => dd.id.toString().padStart(5,"0") === fips);
      showSidebar(fips);
    });

  renderActiveChart();
}

// ─── TOOLTIP ──────────────────────────────────────────────
function showTooltip(event, fips) {
  const d = countyMap.get(fips);
  const tip = document.getElementById("tooltip");
  if (!d) return;
  const r22 = d.rate_2022 != null ? d.rate_2022.toFixed(1) : "N/A";
  const r24 = d.rate_2024 != null ? d.rate_2024.toFixed(1) : "N/A";
  const chg = d.rate_change != null ? (d.rate_change > 0 ? "+" : "") + d.rate_change.toFixed(1) : "N/A";
  tip.innerHTML = `
    <div class="t-name">${d.name_full || d.name}</div>
    <div class="t-stat">2018–22: <span>${r22}</span> · 2020–24: <span>${r24}</span></div>
    <div class="t-stat">Change: <span>${chg}</span> per 100k</div>
  `;
  tip.style.left = (event.clientX + 12) + "px";
  tip.style.top  = (event.clientY - 10) + "px";
  tip.classList.add("visible");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

// ─── SIDEBAR ──────────────────────────────────────────────
function showSidebar(fips) {
  const d = countyMap.get(fips);
  if (!d) return;
  const sidebar = document.getElementById("sidebar");
  const content = document.getElementById("sidebar-content");

  const r22  = d.rate_2022  != null ? d.rate_2022.toFixed(1)  : null;
  const r24  = d.rate_2024  != null ? d.rate_2024.toFixed(1)  : null;
  const chg  = d.rate_change     != null ? d.rate_change.toFixed(1)   : null;
  const chgp = d.rate_change_pct != null ? d.rate_change_pct.toFixed(1) : null;
  const chgClass = d.rate_change > 0 ? "up" : d.rate_change < 0 ? "down" : "";
  const chgSign  = d.rate_change > 0 ? "+" : "";
  const suppNote = (d.suppressed_2022 || d.suppressed_2024)
    ? `<div class="suppressed-note">⚠ Some data suppressed (small county — federal privacy rule for counts &lt;10)</div>` : "";
  const fmt = (v, suffix="") => v != null ? `${v}${suffix}` : `<span class="na-text">N/A</span>`;
  const fmtDollar = v => v != null ? `$${Number(v).toLocaleString()}` : `<span class="na-text">N/A</span>`;
  function barRow(label, val) {
    const pct = val != null ? val : 0;
    return `<div class="bar-row"><div class="bar-header"><span class="bar-label">${label}</span><span class="bar-pct">${val != null ? val.toFixed(1)+"%" : "N/A"}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
  }

  content.innerHTML = `
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    <div class="county-name">${d.name_full || d.name}</div>
    <div class="county-pop">Population: ${d.pop != null ? Number(d.pop).toLocaleString() : "N/A"}</div>
    <div class="rate-cards">
      <div class="rate-card">
        <div class="label">2018–2022</div>
        <div class="value">${r22 ?? '<span class="na-text" style="font-size:14px">N/A</span>'}</div>
        <div class="sublabel">per 100k</div>
      </div>
      <div class="rate-card">
        <div class="label">2020–2024</div>
        <div class="value">${r24 ?? '<span class="na-text" style="font-size:14px">N/A</span>'}</div>
        <div class="sublabel">per 100k</div>
      </div>
    </div>
    ${chg != null ? `<div class="change-card"><div class="change-label">Period Change</div><div><span class="change-value ${chgClass}">${chgSign}${chg}</span>${chgp != null ? `<span class="change-pct ${chgClass}">(${chgSign}${chgp}%)</span>` : ""}</div></div>` : ""}
    ${suppNote}
    <div class="section-title">Socioeconomic Indicators</div>
    <div class="section-gap">
      <div class="stat-row"><span class="stat-label">Median Income</span><span class="stat-value">${fmtDollar(d.median_income)}</span></div>
      <div class="stat-row"><span class="stat-label">Poverty Rate</span><span class="stat-value">${fmt(d.poverty, "%")}</span></div>
      <div class="stat-row"><span class="stat-label">Unemployment</span><span class="stat-value">${fmt(d.unemployment, "%")}</span></div>
      <div class="stat-row"><span class="stat-label">Uninsured</span><span class="stat-value">${fmt(d.uninsured, "%")}</span></div>
      <div class="stat-row"><span class="stat-label">Bachelor's Degree+</span><span class="stat-value">${fmt(d.bachelors, "%")}</span></div>
    </div>
    <div class="section-title">Race / Ethnicity</div>
    <div class="section-gap">
      ${barRow("White", d.white)}${barRow("Black", d.black)}${barRow("Hispanic", d.hispanic)}${barRow("Native", d.native)}${barRow("Asian", d.asian)}
    </div>
    <div class="section-title">Gender</div>
    <div class="section-gap">
      ${barRow("Male", d.male)}${barRow("Female", d.female)}
    </div>

    <div class="section-title">Age Distribution</div>
    <div class="section-gap">
      ${barRow("Under 20", d.age_under20)}${barRow("Age 20–24", d.age_20to24)}${barRow("Age 25–34", d.age_25to34)}${barRow("Age 35–44", d.age_35to44)}${barRow("Age 45–54", d.age_45to54)}${barRow("Age 55–64", d.age_55to64)}${barRow("Age 65+", d.age_65plus)}
    </div>
  `;
  sidebar.classList.add("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  selectedFips = null;
  g.selectAll(".county-path").classed("selected", false);
}

// ─── ZOOM ─────────────────────────────────────────────────
function setupZoom() {
  if (zoomBehavior) { svg.call(zoomBehavior); return zoomBehavior; }
  zoomBehavior = d3.zoom().scaleExtent([1, 8]).on("zoom", (event) => { g.attr("transform", event.transform); });
  svg.call(zoomBehavior);
  svg.on("dblclick.zoom", () => { svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity); });
  return zoomBehavior;
}

// ─── RESIZE ───────────────────────────────────────────────
window.addEventListener("resize", () => {
  if (currentView === "us") drawUS();
  else drawState(currentView);
  renderActiveChart();
});

// ─── RESIZE PANEL ────────────────────────────────────────
(function() {
  const handle = document.getElementById('chart-resize-handle');
  const panel  = document.getElementById('chart-panel');
  const MIN_H  = 42;
  const MAX_H  = 520;
  let dragging = false;
  let startY   = 0;
  let startH   = 0;

  handle.addEventListener('mousedown', (e) => {
    if (panel.classList.contains('collapsed')) return;
    dragging = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = startY - e.clientY; // drag up = bigger
    const newH = Math.min(MAX_H, Math.max(MIN_H, startH + delta));
    panel.style.height = newH + 'px';
    renderActiveChart();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    renderActiveChart();
  });

  // Touch support
  handle.addEventListener('touchstart', (e) => {
    if (panel.classList.contains('collapsed')) return;
    dragging = true;
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const delta = startY - e.touches[0].clientY;
    const newH = Math.min(MAX_H, Math.max(MIN_H, startH + delta));
    panel.style.height = newH + 'px';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    renderActiveChart();
  });
})();

// ─── START ────────────────────────────────────────────────
init();
</script>
</body>
</html>
